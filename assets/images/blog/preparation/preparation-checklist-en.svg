<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#eff6ff"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/></filter></defs><rect width="1600" height="900" fill="url(#bg)"/><text x="120" y="125" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="900" fill="#0f172a">Pre-Paint Checklist</text><text x="120" y="170" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="600" fill="#475569">Confirm these steps before moving on to paint application.</text><g filter="url(#shadow)"><rect x="120" y="240" width="560" height="150" rx="26" fill="#fff" stroke="#dbeafe" stroke-width="2"/></g><circle cx="186" cy="315" r="40" fill="#2563eb"/><text x="186" y="326" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="900" fill="#fff">01</text><text x="248" y="300" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900" fill="#0f172a">Clean surface</text><text x="248" y="334" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Remove silicone, grease, dust and moisture.</text><g filter="url(#shadow)"><rect x="820" y="240" width="560" height="150" rx="26" fill="#fff" stroke="#dbeafe" stroke-width="2"/></g><circle cx="886" cy="315" r="40" fill="#2563eb"/><text x="886" y="326" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="900" fill="#fff">02</text><text x="948" y="300" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900" fill="#0f172a">Damage review</text><text x="948" y="334" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Identify rust, cracks, old coatings and impact areas.</text><g filter="url(#shadow)"><rect x="120" y="430" width="560" height="150" rx="26" fill="#fff" stroke="#dbeafe" stroke-width="2"/></g><circle cx="186" cy="505" r="40" fill="#2563eb"/><text x="186" y="516" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="900" fill="#fff">03</text><text x="248" y="490" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900" fill="#0f172a">Correct sanding</text><text x="248" y="524" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Use the right grit and feather the repair edge.</text><g filter="url(#shadow)"><rect x="820" y="430" width="560" height="150" rx="26" fill="#fff" stroke="#dbeafe" stroke-width="2"/></g><circle cx="886" cy="505" r="40" fill="#2563eb"/><text x="886" y="516" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="900" fill="#fff">04</text><text x="948" y="490" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900" fill="#0f172a">Primer choice</text><text x="948" y="524" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Evaluate metal, plastic and filler zones separately.</text><g filter="url(#shadow)"><rect x="120" y="620" width="560" height="150" rx="26" fill="#fff" stroke="#dbeafe" stroke-width="2"/></g><circle cx="186" cy="695" r="40" fill="#2563eb"/><text x="186" y="706" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="900" fill="#fff">05</text><text x="248" y="680" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900" fill="#0f172a">Mixing control</text><text x="248" y="714" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Set filler, hardener and thinner to technical ratio.</text><g filter="url(#shadow)"><rect x="820" y="620" width="560" height="150" rx="26" fill="#fff" stroke="#dbeafe" stroke-width="2"/></g><circle cx="886" cy="695" r="40" fill="#2563eb"/><text x="886" y="706" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="900" fill="#fff">06</text><text x="948" y="680" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900" fill="#0f172a">Waiting time</text><text x="948" y="714" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Respect flash off and full curing times.</text></svg>