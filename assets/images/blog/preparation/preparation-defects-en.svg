<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950" role="img"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fbff"/><stop offset="100%" stop-color="#eef2ff"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/></filter></defs><rect width="1600" height="950" fill="url(#bg)"/><text x="120" y="120" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="900" fill="#0f172a">Common Defects and Root Causes</text><text x="120" y="165" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="600" fill="#475569">Correct defect analysis starts by identifying the reason under the surface.</text><g filter="url(#shadow)"><rect x="120" y="240" width="1360" height="96" rx="24" fill="#fff" stroke="#e2e8f0" stroke-width="2"/></g><rect x="140" y="258" width="280" height="60" rx="18" fill="#fef2f2"/><text x="160" y="296" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="900" fill="#dc2626">Rust return</text><text x="470" y="282" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a">Cause:</text><text x="550" y="282" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Incomplete rust removal, weak metal primer</text><text x="470" y="310" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a">Approach:</text><text x="590" y="310" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Open back to stable metal and rebuild with suitable primer</text><g filter="url(#shadow)"><rect x="120" y="370" width="1360" height="96" rx="24" fill="#fff" stroke="#e2e8f0" stroke-width="2"/></g><rect x="140" y="388" width="280" height="60" rx="18" fill="#fff7ed"/><text x="160" y="426" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="900" fill="#f97316">Colour bleeding</text><text x="470" y="412" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a">Cause:</text><text x="550" y="412" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Contamination, old bitumen residue, wrong mix</text><text x="470" y="440" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a">Approach:</text><text x="590" y="440" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Sand back to the affected layer and rebuild the system</text><g filter="url(#shadow)"><rect x="120" y="500" width="1360" height="96" rx="24" fill="#fff" stroke="#e2e8f0" stroke-width="2"/></g><rect x="140" y="518" width="280" height="60" rx="18" fill="#eff6ff"/><text x="160" y="556" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="900" fill="#2563eb">Sanding marks</text><text x="470" y="542" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a">Cause:</text><text x="550" y="542" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Too coarse grit, dust, poor feathering</text><text x="470" y="570" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a">Approach:</text><text x="590" y="570" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Finish with finer grit and controlled final sanding</text><g filter="url(#shadow)"><rect x="120" y="630" width="1360" height="96" rx="24" fill="#fff" stroke="#e2e8f0" stroke-width="2"/></g><rect x="140" y="648" width="280" height="60" rx="18" fill="#ecfeff"/><text x="160" y="686" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="900" fill="#0891b2">Blisters and pinholes</text><text x="470" y="672" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a">Cause:</text><text x="550" y="672" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Moisture, trapped air, thick filler, short flash off</text><text x="470" y="700" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a">Approach:</text><text x="590" y="700" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Extend drying time and reprepare the affected area</text><g filter="url(#shadow)"><rect x="120" y="760" width="1360" height="96" rx="24" fill="#fff" stroke="#e2e8f0" stroke-width="2"/></g><rect x="140" y="778" width="280" height="60" rx="18" fill="#f0fdf4"/><text x="160" y="816" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="900" fill="#059669">Poor adhesion</text><text x="470" y="802" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a">Cause:</text><text x="550" y="802" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Wrong primer, grease residue, uncured undercoat</text><text x="470" y="830" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a">Approach:</text><text x="590" y="830" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Clean again and select a primer that matches the substrate</text></svg>