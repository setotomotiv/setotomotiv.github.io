<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Oto boya hazirlik surecleri</title>
<desc id="desc">Yuzey temizligi, zimpara, astar ve son kontrol asamalarini gosteren gorsel.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#eff6ff"/>
    <stop offset="55%" stop-color="#dbeafe"/>
    <stop offset="100%" stop-color="#f8fafc"/>
  </linearGradient>
  <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#f8fafc"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.14"/>
  </filter>
</defs>
<rect width="1600" height="900" fill="url(#bg)"/>
<g opacity="0.55">
  <circle cx="1450" cy="150" r="170" fill="#bfdbfe"/>
  <circle cx="180" cy="760" r="220" fill="#e0f2fe"/>
</g>
<g filter="url(#shadow)">
  <rect x="70" y="68" width="1460" height="764" rx="34" fill="url(#panel)"/>
</g>
<text x="120" y="154" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#2563eb">SET OTOMOTIV BLOG</text>
<text x="120" y="214" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="900" fill="#0f172a">Oto Boya Hazirlik Surecleri</text>
<text x="120" y="260" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="600" fill="#475569">Dogru zemin hazirligi daha temiz gorunum, daha guclu tutunma ve daha uzun omur saglar.</text>

<g>
  <rect x="110" y="330" width="900" height="420" rx="28" fill="#0f172a" opacity="0.03"/>
  <rect x="130" y="350" width="860" height="380" rx="28" fill="#ffffff" stroke="#dbeafe" stroke-width="2"/>
  <text x="170" y="405" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900" fill="#0f172a">Hazirlik Akisi</text>

  <g transform="translate(170 455)">
    <circle cx="0" cy="0" r="28" fill="#2563eb"/>
    <text x="0" y="9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900" fill="#fff">1</text>
    <text x="50" y="-6" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a">Yag ve kir temizligi</text>
    <text x="50" y="24" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Yuzeyde silikon, toz ve kir birakmayin.</text>
  </g>
  <g transform="translate(170 545)">
    <circle cx="0" cy="0" r="28" fill="#2563eb"/>
    <text x="0" y="9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900" fill="#fff">2</text>
    <text x="50" y="-6" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a">Pas ve eski katman kontrolu</text>
    <text x="50" y="24" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Zayif bolgeyi saglam zemine kadar acin.</text>
  </g>
  <g transform="translate(170 635)">
    <circle cx="0" cy="0" r="28" fill="#2563eb"/>
    <text x="0" y="9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900" fill="#fff">3</text>
    <text x="50" y="-6" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a">Dogru zimpara ve astar</text>
    <text x="50" y="24" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Yuzeye uygun grit ve primer secin.</text>
  </g>

  <g transform="translate(570 455)">
    <circle cx="0" cy="0" r="28" fill="#06b6d4"/>
    <text x="0" y="9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900" fill="#fff">4</text>
    <text x="50" y="-6" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a">Macun ve dolgu astari</text>
    <text x="50" y="24" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Ince kat uygulayip kuruma suresini bekleyin.</text>
  </g>
  <g transform="translate(570 545)">
    <circle cx="0" cy="0" r="28" fill="#06b6d4"/>
    <text x="0" y="9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900" fill="#fff">5</text>
    <text x="50" y="-6" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a">Toz alma ve son kontrol</text>
    <text x="50" y="24" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Maskeleme ve gecis kenarlarini gozden gecirin.</text>
  </g>
  <g transform="translate(570 635)">
    <circle cx="0" cy="0" r="28" fill="#06b6d4"/>
    <text x="0" y="9" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900" fill="#fff">6</text>
    <text x="50" y="-6" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a">Boya oncesi bekleme</text>
    <text x="50" y="24" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Teknik foya gore flash off suresini uygulayin.</text>
  </g>
</g>

<g transform="translate(1070 330)">
  <rect x="0" y="0" width="370" height="420" rx="28" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="36" y="54" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="900" fill="#0f172a">Neden Onemli?</text>
  <g transform="translate(36 96)">
    <rect x="0" y="0" width="298" height="76" rx="22" fill="#fff"/>
    <circle cx="38" cy="38" r="22" fill="#dbeafe"/>
    <text x="38" y="47" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" fill="#2563eb">+</text>
    <text x="76" y="34" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#0f172a">Daha duzgun yuzey</text>
    <text x="76" y="58" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">Iz, dalga ve cizgi riski azalir.</text>
  </g>
  <g transform="translate(36 188)">
    <rect x="0" y="0" width="298" height="76" rx="22" fill="#fff"/>
    <circle cx="38" cy="38" r="22" fill="#d1fae5"/>
    <path d="M29 38l6 6 12-14" fill="none" stroke="#059669" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="76" y="34" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#0f172a">Guclu tutunma</text>
    <text x="76" y="58" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">Astar ve son kat daha saglam oturur.</text>
  </g>
  <g transform="translate(36 280)">
    <rect x="0" y="0" width="298" height="102" rx="22" fill="#fff"/>
    <circle cx="38" cy="38" r="22" fill="#fee2e2"/>
    <path d="M31 31l14 14M45 31L31 45" fill="none" stroke="#dc2626" stroke-width="5" stroke-linecap="round"/>
    <text x="76" y="34" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#0f172a">Onlenen kusurlar</text>
    <text x="76" y="58" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">Kabarcik, pinhole, kenar izi,</text>
    <text x="76" y="80" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">pas geri donusu ve renk kusmasi.</text>
  </g>
</g>
</svg>