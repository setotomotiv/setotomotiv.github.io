troke-width="2"/></g><rect x="564" y="264" width="312" height="96" rx="22" fill="#ecfeff"/><text x="588" y="320" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="900" fill="#0891b2">Plastic Surface</text><circle cx="592" cy="404" r="10" fill="#0891b2"/><text x="618" y="410" font-family="Inter, Arial, sans-serif" font-size="22" fill="#334155">Use a plastic-safe cleaner</text><circle cx="592" cy="492" r="10" fill="#0891b2"/><text x="618" y="498" font-family="Inter, Arial, sans-serif" font-size="22" fill="#334155">Consider adhesion promoter</text><circle cx="592" cy="580" r="10" fill="#0891b2"/><text x="618" y="586" font-family="Inter, Arial, sans-serif" font-size="22" fill="#334155">Avoid excess heat on the part</text><rect x="572" y="640" width="296" height="64" rx="20" fill="#f8fafc"/><text x="592" y="679" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#64748b">Workflow and primer choice change with the substrate.</text><g filter="url(#shadow)"><rect x="960" y="240" width="360" height="500" rx="28" fill="#fff" stroke="#e2e8f0" stroke-width="2"/></g><rect x="984" y="264" width="312" height="96" rx="22" fill="#f0fdf4"/><text x="1008" y="320" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="900" fill="#059669">Filled Surface</text><circle cx="1012" cy="404" r="10" fill="#059669"/><text x="1038" y="410" font-family="Inter, Arial, sans-serif" font-size="22" fill="#334155">Apply filler in thin layers</text><circle cx="1012" cy="492" r="10" fill="#059669"/><text x="1038" y="498" font-family="Inter, Arial, sans-serif" font-size="22" fill="#334155">Final sand after full cure</text><circle cx="1012" cy="580" r="10" fill="#059669"/><text x="1038" y="586" font-family="Inter, Arial, sans-serif" font-size="22" fill="#334155">Use filler primer to level the surface</text><rect x="992" y="640" width="296" height="64" rx="20" fill="#f8fafc"/><text x="1012" y="679" font-family="Inter, Arial, sans-serif" font-size="18" 