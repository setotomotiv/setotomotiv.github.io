<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f8fafc"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/></filter></defs>
<rect width="1600" height="900" fill="url(#bg)"/>
<text x="120" y="120" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="900" fill="#0f172a">Yuzeye Gore Hazirlik Yaklasimi</text>
<text x="120" y="165" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="600" fill="#475569">Metal, plastik ve macunlu yuzey ayni sekilde hazirlanmaz.</text>
<g filter="url(#shadow)"><rect x="120" y="240" width="360" height="500" rx="28" fill="#fff" stroke="#e2e8f0" stroke-width="2"/></g><rect x="144" y="264" width="312" height="96" rx="22" fill="#eff6ff"/><text x="168" y="320" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="900" fill="#2563eb">Metal Yuzey</text><circle cx="172" cy="404" r="10" fill="#2563eb"/><text x="198" y="410" font-family="Inter, Arial, sans-serif" font-size="22" fill="#334155">Pas kontrolu yapin</text><circle cx="172" cy="492" r="10" fill="#2563eb"/><text x="198" y="498" font-family="Inter, Arial, sans-serif" font-size="22" fill="#334155">Yag giderici ile temizleyin</text><circle cx="172" cy="580" r="10" fill="#2563eb"/><text x="198" y="586" font-family="Inter, Arial, sans-serif" font-size="22" fill="#334155">Epoksi veya metal primer dusunun</text><rect x="152" y="640" width="296" height="64" rx="20" fill="#f8fafc"/><text x="172" y="679" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#64748b">Yuzey tipi degistikce astar ve is akisi da degisir.</text><g filter="url(#shadow)"><rect x="540" y="240" width="360" height="500" rx="28" fill="#fff" stroke="#e2e8f0" stroke-width="2"/></g><rect x="564" y="264" width="312" height="96" rx="22" fill="#ecfeff"/><text x="588" y="320" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="900" fill="#0891b2">Plastik Yuzey</text><circle cx="592" cy="404" r="10" fill="#0891b2"/><text x="618" y="410" font-family="Inter, Arial, sans-serif" font-size="22" fill="#334155">Esnek yuzey temizleyici kullanin</text><circle cx="592" cy="492" r="10" fill="#0891b2"/><text x="618" y="498" font-family="Inter, Arial, sans-serif" font-size="22" fill="#334155">Plastik adhesion promoter dusunun</text><circle cx="592" cy="580" r="10" fill="#0891b2"/><text x="618" y="586" font-family="Inter, Arial, sans-serif" font-size="22" fill="#334155">Asiri sicakliktan kacin</text><rect x="572" y="640" width="296" height="64" rx="20" fill="#f8fafc"/><text x="592" y="679" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#64748b">Yuzey tipi degistikce astar ve is akisi da degisir.</text><g filter="url(#shadow)"><rect x="960" y="240" width="360" height="500" rx="28" fill="#fff" stroke="#e2e8f0" stroke-width="2"/></g><rect x="984" y="264" width="312" height="96" rx="22" fill="#f0fdf4"/><text x="1008" y="320" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="900" fill="#059669">Macunlu Yuzey</text><circle cx="1012" cy="404" r="10" fill="#059669"/><text x="1038" y="410" font-family="Inter, Arial, sans-serif" font-size="22" fill="#334155">Ince kat macun uygulayin</text><circle cx="1012" cy="492" r="10" fill="#059669"/><text x="1038" y="498" font-family="Inter, Arial, sans-serif" font-size="22" fill="#334155">Tam kuruma sonrasi son zımpara yapin</text><circle cx="1012" cy="580" r="10" fill="#059669"/><text x="1038" y="586" font-family="Inter, Arial, sans-serif" font-size="22" fill="#334155">Dolgu astari ile yuzeyi dengeleyin</text><rect x="992" y="640" width="296" height="64" rx="20" fill="#f8fafc"/><text x="1012" y="679" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#64748b">Yuzey tipi degistikce astar ve is akisi da degisir.</text></svg>