<!DOCTYPE html>
<html lang="en">
<head>
<!--
# 📄 Dosya Yolu: en/ref.html
# 📌 Amac: references page with shared partials and JSON driven content
# 📌 Modul - HTML
# Version: 5.8.0
# Aciklama: reference cards and filters are fed by JSON content
# Bagimli Oldugu Katman: View
-->
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<meta content="#1d4ed8" name="theme-color"/>
<meta content="Review Set Otomotiv's partnership approach and selected reference areas." name="description"/>
<link rel="canonical" href="https://www.setotomotiv.com/en/ref.html">
<link rel="alternate" hreflang="tr" href="https://www.setotomotiv.com/tr/ref.html">
<link rel="alternate" hreflang="en" href="https://www.setotomotiv.com/en/ref.html">
<link rel="alternate" hreflang="x-default" href="https://www.setotomotiv.com/">
<meta property="og:locale" content="en_US">
<meta property="og:type" content="website">
<meta property="og:title" content="References | Set Otomotiv">
<meta property="og:description" content="Review Set Otomotiv's partnership approach and selected reference areas.">
<meta property="og:url" content="https://www.setotomotiv.com/en/ref.html">
<meta property="og:site_name" content="Set Otomotiv">
<meta property="og:image" content="https://www.setotomotiv.com/assets/images/banner/banner1.webp">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="References | Set Otomotiv">
<meta name="twitter:description" content="Review Set Otomotiv's partnership approach and selected reference areas.">
<meta name="twitter:image" content="https://www.setotomotiv.com/assets/images/banner/banner1.webp">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
<link href="../assets/css/site.css" rel="stylesheet"/>
<title>References | Set Otomotiv</title>
</head>
<body data-content-file="../data/content/en/references.json" data-page-lang="en">
<div data-include="../partials/en/header.html"></div>
<section class="breadcrumb-band">
  <div class="container position-relative">
    <span class="crumb"><i class="bi bi-people"></i> <span data-content="breadcrumb.eyebrow"></span></span>
    <h1 class="mt-3 mb-3" data-content="breadcrumb.title"></h1>
    <p class="mb-0" data-content="breadcrumb.desc"></p>
  </div>
</section>
<section class="section-padding">
  <div class="container container-xl">
    <div class="section-title">
      <span class="eyebrow"><i class="bi bi-hand-thumbs-up"></i> <span data-content="intro.eyebrow"></span></span>
      <h2 data-content="intro.title"></h2>
      <p data-content="intro.desc"></p>
    </div>
    <div class="filter-bar mb-4" data-filter-scope data-filter-target=".reference-item" data-filter-buttons="filters"></div>
    <div class="row g-4 reference-grid" data-repeat="items">
      <template>
        <div class="col-md-6 col-xl-4 reference-item" data-filter-tags="{{category}}">
          <div class="reference-card reference-card-rich">
            <span class="brand-chip">{{badge}}</span>
            <div class="reference-media">
              <div class="reference-logo-wrap">
                <img src="{{logo}}" alt="{{logoAlt}}" loading="lazy">
              </div>
              <div class="reference-logo-wrap reference-logo-wrap-secondary {{logoSecondaryClass}}">
                <img src="{{logoSecondary}}" alt="{{logoSecondaryAlt}}" loading="lazy">
              </div>
            </div>
            <div class="icon-badge"><i class="{{icon}}"></i></div>
            <h3>{{title}}</h3>
            <p>{{text}}</p>
          </div>
        </div>
      </template>
    </div>
  </div>
</section>
<section class="section-padding pt-0">
  <div class="container">
    <div class="split-band">
      <div class="row align-items-center g-4">
        <div class="col-lg-8">
          <h2 class="display-6 fw-bold" data-content="cta.title"></h2>
          <p class="mb-0" data-content="cta.desc"></p>
        </div>
        <div class="col-lg-4 text-lg-end"><a class="btn btn-light btn-lg" href="contact.html" data-content="cta.button"></a></div>
      </div>
    </div>
  </div>
</section>
<div data-include="../partials/en/footer.html"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/tracking-config.js"></script>
<script src="../assets/js/include-loader.js"></script>
<script src="../assets/js/content-loader.js"></script>
<script src="../assets/js/filter-system.js"></script>
<script src="../assets/js/site.js"></script>
</body>
</html>
