<section class="hero">
  <div class="container container-xl">
    <div class="row align-items-center g-5">
      <div class="col-lg-6">
        <div class="hero-copy">
          <span class="eyebrow"><i class="bi bi-stars"></i> <span data-content="hero.eyebrow"></span></span>
          <h1 data-content="hero.title"></h1>
          <p data-content="hero.desc"></p>
          <div class="d-flex flex-wrap gap-3 mt-4">
            <a class="btn btn-primary btn-lg" href="services.html" data-content="hero.primary"></a>
            <a class="btn btn-outline-dark btn-lg" href="contact.html" data-content="hero.secondary"></a>
          </div>
          <div class="hero-badges mt-4">
            <span><i class="bi bi-check2-circle"></i><span data-content="hero.badges.0"></span></span>
            <span><i class="bi bi-lightning-charge"></i><span data-content="hero.badges.1"></span></span>
            <span><i class="bi bi-shield-check"></i><span data-content="hero.badges.2"></span></span>
          </div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="hero-slider-wrap glass-panel hero-visual">
          <div id="heroSlider" class="carousel slide hero-slider" data-bs-ride="carousel">
            <div class="carousel-indicators">
              <button type="button" data-bs-target="#heroSlider" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
              <button type="button" data-bs-target="#heroSlider" data-bs-slide-to="1" aria-label="Slide 2"></button>
              <button type="button" data-bs-target="#heroSlider" data-bs-slide-to="2" aria-label="Slide 3"></button>
              <button type="button" data-bs-target="#heroSlider" data-bs-slide-to="3" aria-label="Slide 4"></button>
            </div>
            <div class="carousel-inner">
              <div class="carousel-item active">
                <img class="d-block w-100 hero-slide-image" loading="eager" src="../assets/images/banner/banner3.webp" alt="Hero slider 1" data-content="hero.slides.0.image" data-content-mode="attr" data-content-attr="src">
                <div class="hero-slider-caption hero-caption-top">
                  <strong data-content="hero.slides.0.cardTitle"></strong>
                  <p data-content="hero.slides.0.cardText"></p>
                </div>
                <div class="hero-slider-caption hero-caption-bottom">
                  <strong data-content="hero.slides.0.footerTitle"></strong>
                  <p data-content="hero.slides.0.footerText"></p>
                </div>
              </div>
              <div class="carousel-item">
                <img class="d-block w-100 hero-slide-image" loading="lazy" src="../assets/images/banner/banner1.webp" alt="Hero slider 2" data-content="hero.slides.1.image" data-content-mode="attr" data-content-attr="src">
                <div class="hero-slider-caption hero-caption-top">
                  <strong data-content="hero.slides.1.cardTitle"></strong>
                  <p data-content="hero.slides.1.cardText"></p>
                </div>
                <div class="hero-slider-caption hero-caption-bottom">
                  <strong data-content="hero.slides.1.footerTitle"></strong>
                  <p data-content="hero.slides.1.footerText"></p>
                </div>
              </div>
              <div class="carousel-item">
                <img class="d-block w-100 hero-slide-image" loading="lazy" src="../assets/images/banner/banner4.webp" alt="Hero slider 3" data-content="hero.slides.2.image" data-content-mode="attr" data-content-attr="src">
                <div class="hero-slider-caption hero-caption-top">
                  <strong data-content="hero.slides.2.cardTitle"></strong>
                  <p data-content="hero.slides.2.cardText"></p>
                </div>
                <div class="hero-slider-caption hero-caption-bottom">
                  <strong data-content="hero.slides.2.footerTitle"></strong>
                  <p data-content="hero.slides.2.footerText"></p>
                </div>
              </div>
                          <div class="carousel-item">
                <img class="d-block w-100 hero-slide-image" loading="lazy" src="../assets/images/banner/banner5.webp" alt="Hero slider 4" data-content="hero.slides.3.image" data-content-mode="attr" data-content-attr="src">
                <div class="hero-slider-caption hero-caption-top">
                  <strong data-content="hero.slides.3.cardTitle"></strong>

                <div class="hero-slider-caption hero-caption-bottom">
                  <strong data-content="hero.slides.3.footerTitle"></strong>
                  <p data-content="hero.slides.3.footerText"></p>
                </div>
              </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#heroSlider" data-bs-slide="prev">
              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#heroSlider" data-bs-slide="next">
              <span class="carousel-control-next-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Next</span>
            </button>
          </div>
        </div>
      </div>
