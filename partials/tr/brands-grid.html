# Aciklama: marka grid bolumu JSON icerigi, filtre ve logo verisi ile repeater mantiginda doldurulur
# Bagimli Oldugu Katman: View
-->
<section class="section-padding">
  <div class="container">
    <div class="section-title text-center mb-4 mx-auto">
      <span class="eyebrow"><i class="bi bi-grid"></i> <span data-content="brands.title"></span></span>
      <h2 data-content="brands.title"></h2>
      <p class="text-secondary mb-0" data-content="brands.desc"></p>
    </div>
    <div class="filter-bar justify-content-center mb-4" data-filter-scope data-filter-target=".brand-item" data-filter-buttons="brands.filters"></div>
    <div class="row g-4 so-brands" data-repeat="brands.items">
      <template>
        <div class="col-md-6 col-xl-4 brand-item" data-filter-tags="{{category}}">
          <div class="brand-card">
            <span class="brand-chip">{{badge}}</span>
            <div class="brand-logo-wrap">
              <img src="{{logo}}" alt="{{logoAlt}}" loading="lazy">
            </div>
            <h3>{{name}}</h3>
            <p>{{text}}</p>
          </div>
        </div>
      </template>
    </div>
  </div>
</section>
